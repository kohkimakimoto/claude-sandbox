version: 2

project_name: claude-sandbox

before:
  hooks:
    - go mod tidy

builds:
  - id: claude-sandbox
    main: ./cmd/claude-sandbox
    binary: claude-sandbox
    env:
      - CGO_ENABLED=0
    # claude-sandbox is a macOS-only tool.
    targets:
      - darwin_amd64
      - darwin_arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/kohkimakimoto/claude-sandbox/v2/internal/version.Version={{.Version}}
      - -X github.com/kohkimakimoto/claude-sandbox/v2/internal/version.CommitHash={{.ShortCommit}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  github:
    owner: kohkimakimoto
    name: claude-sandbox
  draft: false
  # Automatically marks as prerelease if the tag contains a hyphen (e.g. v2.0.0-rc1).
  prerelease: auto
  # Overwrites the existing release if re-run for the same tag.
  mode: replace
